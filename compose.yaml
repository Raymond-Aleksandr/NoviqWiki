services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to a complete PostgreSQL URL with URL-encoded credentials}
      NEXTWIKI_BASE_URL: ${NEXTWIKI_BASE_URL:?Set NEXTWIKI_BASE_URL to the canonical public URL}
      NEXTWIKI_SECRET: ${NEXTWIKI_SECRET:?Set NEXTWIKI_SECRET to a stable random secret}
      NEXTWIKI_SETUP_TOKEN: ${NEXTWIKI_SETUP_TOKEN:-}
      NEXTWIKI_TRUSTED_PROXY_HOPS: ${NEXTWIKI_TRUSTED_PROXY_HOPS:-}
      NEXTWIKI_SMTP_URL: ${NEXTWIKI_SMTP_URL:-}
      NEXTWIKI_EMAIL_FROM: ${NEXTWIKI_EMAIL_FROM:-}
      NEXTWIKI_MEDIA_DRIVER: ${NEXTWIKI_MEDIA_DRIVER:-local}
      NEXTWIKI_MEDIA_ROOT: /app/media
      NEXTWIKI_STORAGE_PUBLIC_PATH: /media
      NEXTWIKI_S3_ENDPOINT: ${NEXTWIKI_S3_ENDPOINT:-}
      NEXTWIKI_S3_REGION: ${NEXTWIKI_S3_REGION:-us-east-1}
      NEXTWIKI_S3_BUCKET: ${NEXTWIKI_S3_BUCKET:-}
      NEXTWIKI_S3_ACCESS_KEY_ID: ${NEXTWIKI_S3_ACCESS_KEY_ID:-}
      NEXTWIKI_S3_SECRET_ACCESS_KEY: ${NEXTWIKI_S3_SECRET_ACCESS_KEY:-}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - nextwiki-media:/app/media
      - nextwiki-backups:/app/backups
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nextwiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to the raw database password}
      POSTGRES_DB: ${POSTGRES_DB:-nextwiki}
    volumes:
      - nextwiki-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  nextwiki-db:
  nextwiki-media:
  nextwiki-backups:
