services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://noviqwiki:noviqwiki@db:5432/noviqwiki
      NOVIQWIKI_BASE_URL: http://localhost:3000
      NOVIQWIKI_SECRET: ${NOVIQWIKI_SECRET:-}
      NOVIQWIKI_MEDIA_DRIVER: local
      NOVIQWIKI_MEDIA_ROOT: /app/media
      NOVIQWIKI_STORAGE_PUBLIC_PATH: /media
    ports:
      - "3000:3000"
    volumes:
      - noviqwiki-media:/app/media
      - noviqwiki-backups:/app/backups
      - noviqwiki-secrets:/app/secrets
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: noviqwiki
      POSTGRES_PASSWORD: noviqwiki
      POSTGRES_DB: noviqwiki
    volumes:
      - noviqwiki-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noviqwiki -d noviqwiki"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  noviqwiki-db:
  noviqwiki-media:
  noviqwiki-backups:
  noviqwiki-secrets:
