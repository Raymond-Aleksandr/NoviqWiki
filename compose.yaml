services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://nextwiki:nextwiki@db:5432/nextwiki
      NEXTWIKI_BASE_URL: http://localhost:3000
      NEXTWIKI_SECRET: ${NEXTWIKI_SECRET:-}
      NEXTWIKI_MEDIA_DRIVER: local
      NEXTWIKI_MEDIA_ROOT: /app/media
      NEXTWIKI_STORAGE_PUBLIC_PATH: /media
    ports:
      - "3000:3000"
    volumes:
      - nextwiki-media:/app/media
      - nextwiki-backups:/app/backups
      - nextwiki-secrets:/app/secrets
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nextwiki
      POSTGRES_PASSWORD: nextwiki
      POSTGRES_DB: nextwiki
    volumes:
      - nextwiki-db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextwiki -d nextwiki"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  nextwiki-db:
  nextwiki-media:
  nextwiki-backups:
  nextwiki-secrets:
