services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to a complete PostgreSQL URL with URL-encoded credentials}
      NOVIQWIKI_BASE_URL: ${NOVIQWIKI_BASE_URL:?Set NOVIQWIKI_BASE_URL to the canonical public URL}
      NOVIQWIKI_SECRET: ${NOVIQWIKI_SECRET:?Set NOVIQWIKI_SECRET to a stable random secret}
      NOVIQWIKI_SETUP_TOKEN: ${NOVIQWIKI_SETUP_TOKEN:-}
      NOVIQWIKI_TRUSTED_PROXY_HOPS: ${NOVIQWIKI_TRUSTED_PROXY_HOPS:-}
      NOVIQWIKI_SMTP_URL: ${NOVIQWIKI_SMTP_URL:-}
      NOVIQWIKI_EMAIL_FROM: ${NOVIQWIKI_EMAIL_FROM:-}
      NOVIQWIKI_MEDIA_DRIVER: ${NOVIQWIKI_MEDIA_DRIVER:-local}
      NOVIQWIKI_MEDIA_ROOT: /app/media
      NOVIQWIKI_STORAGE_PUBLIC_PATH: /media
      NOVIQWIKI_S3_ENDPOINT: ${NOVIQWIKI_S3_ENDPOINT:-}
      NOVIQWIKI_S3_REGION: ${NOVIQWIKI_S3_REGION:-us-east-1}
      NOVIQWIKI_S3_BUCKET: ${NOVIQWIKI_S3_BUCKET:-}
      NOVIQWIKI_S3_ACCESS_KEY_ID: ${NOVIQWIKI_S3_ACCESS_KEY_ID:-}
      NOVIQWIKI_S3_SECRET_ACCESS_KEY: ${NOVIQWIKI_S3_SECRET_ACCESS_KEY:-}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - noviqwiki-media:/app/media
      - noviqwiki-backups:/app/backups
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noviqwiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to the raw database password}
      POSTGRES_DB: ${POSTGRES_DB:-noviqwiki}
    volumes:
      - noviqwiki-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  noviqwiki-db:
  noviqwiki-media:
  noviqwiki-backups:
