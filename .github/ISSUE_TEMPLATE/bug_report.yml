name: Bug report
description: Report a reproducible problem in NoviqWiki.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Include enough detail for someone to reproduce it against the Next.js app and PostgreSQL-backed services.
  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List exact steps, seed data, URLs, account roles, and commands.
      placeholder: |
        1. Start the app with ...
        2. Sign in as ...
        3. Navigate to ...
        4. Observe ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - App Router route or page
        - Server action or route handler
        - Domain service
        - PostgreSQL or Drizzle
        - Markdown rendering
        - Search
        - Authentication or authorization
        - Docker or deployment
        - CI or automation
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node.js version, pnpm version, database version, branch, and commit if available.
      render: text
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, stack traces, screenshots, or failing test output.
      render: text
