version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 10
    groups:
      next-and-react:
        patterns:
          - next
          - react
          - react-dom
      database:
        patterns:
          - drizzle-*
          - postgres
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      markdown-rendering:
        patterns:
          - unified
          - remark-*
          - rehype-*
          - hast-*
          - mdast-*
          - micromark-*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
